<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; min-height: 100vh; -webkit-font-smoothing: antialiased; }

        /* 顶部导航 */
        header { 
            background: linear-gradient(135deg, #064e3b 0%, #0f766e 100%);
            color: #fff; 
            padding: 16px 32px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-header {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }
        .btn-header:hover {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* 主容器 */
        .container { max-width: 1400px; margin: 28px auto; padding: 0 24px; }

        /* 卡片 */
        .card { 
            background: #fff; 
            border-radius: 16px; 
            padding: 28px; 
            margin-bottom: 24px; 
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.03);
        }
        .card-title { 
            font-size: 18px; 
            color: #0f6b48; 
            border-bottom: 1px solid #f1f5f9; 
            padding-bottom: 12px; 
            margin-bottom: 24px; 
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 配置表单 */
        .form-row {
            display: grid;
            grid-template-columns: 160px 1fr;
            gap: 20px;
            margin-bottom: 18px;
            align-items: center;
        }
        .form-label {
            font-weight: 700;
            color: #475569;
            font-size: 14px;
        }
        .form-input {
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background-color: #f8fafc;
            color: #1e293b;
            transition: all 0.2s ease;
            width: 100%;
        }
        .form-input:focus {
            outline: none;
            border-color: #10b981;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            color: #475569;
        }
        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #10b981;
            cursor: pointer;
        }

        /* 表格样式 */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: #f1f5f9;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }
        th {
            font-weight: 700;
            color: #475569;
            font-size: 13px;
            text-transform: none;
            letter-spacing: 0.5px;
        }
        td {
            font-size: 14px;
            color: #334155;
            vertical-align: middle;
        }
        tbody tr {
            transition: background 0.15s ease;
        }
        tbody tr:hover {
            background: #f8fafc;
        }
        .table-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }
        .table-input:focus {
            outline: none;
            border-color: #10b981;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
        }
        .table-input-small {
            width: 65px;
            text-align: center;
        }

        /* 按钮 */
        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 8px 12px -3px rgba(16, 185, 129, 0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(244, 63, 94, 0.2);
        }
        .btn-danger:hover {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            box-shadow: 0 8px 12px -3px rgba(244, 63, 94, 0.3);
        }
        .btn-success {
            background: linear-gradient(135deg, #34d399 0%, #059669 100%);
            color: white;
        }
        .btn-success:hover {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            color: #1f2937;
        }

        /* 图片预览 */
        .img-preview {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }
        .img-preview:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.18);
        }

        /* 提示信息 */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            z-index: 9999;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid transparent;
            display: none;
            animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .toast.success {
            background: rgba(240, 253, 250, 0.95);
            color: #0f766e;
            border-color: #99f6e4;
            backdrop-filter: blur(8px);
        }
        .toast.error {
            background: rgba(254, 242, 242, 0.95);
            color: #991b1b;
            border-color: #fecaca;
            backdrop-filter: blur(8px);
        }

        /* 操作按钮列 */
        .action-btns {
            display: flex;
            gap: 6px;
        }

        /* 批量导入/导出 */
        .bulk-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
        }

        /* 文件上传 */
        .file-input {
            display: none;
        }

        /* 帮助提示 */
        .help-text {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Modal 弹窗优化 */
        #smart-import-modal {
            backdrop-filter: blur(8px);
            background: rgba(15, 23, 42, 0.4) !important;
            transition: all 0.3s ease;
        }
        #smart-import-modal > div {
            background: white !important;
            border-radius: 16px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25) !important;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05) !important;
        }

        /* ===== 响应式设计 - 手机端适配 ===== */
        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
            }
            
            /* 顶部导航 */
            header {
                flex-direction: column;
                gap: 12px;
                padding: 16px 20px;
                align-items: flex-start;
            }
            
            h1 {
                font-size: 18px;
            }
            
            .header-actions {
                width: 100%;
                flex-wrap: wrap;
                justify-content: flex-start;
                gap: 8px;
            }
            
            .btn-header {
                padding: 6px 12px;
                font-size: 12px;
                flex: 1;
                min-width: 100px;
                text-align: center;
            }
            
            /* 容器 */
            .container {
                padding: 0 16px;
                margin: 16px auto;
            }
            
            /* 卡片 */
            .card {
                padding: 16px;
                margin-bottom: 16px;
                border-radius: 12px;
            }
            
            .card-title {
                font-size: 16px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            
            /* 表单 */
            .form-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }
            
            .form-label {
                font-size: 13px;
            }
            
            .form-input {
                font-size: 13px;
            }
            
            /* 批量操作按钮 */
            .bulk-actions {
                flex-wrap: wrap;
                width: 100%;
                margin-top: 10px;
                gap: 8px;
            }
            
            .bulk-actions .btn {
                flex: 1;
                min-width: 110px;
            }
            
            /* 表格容器 */
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            table {
                min-width: 600px;
                font-size: 12px;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
            
            th {
                font-size: 11px;
            }
            
            .table-input {
                padding: 6px 8px;
                font-size: 12px;
            }
            
            .img-preview {
                width: 40px;
                height: 40px;
            }
            
            /* 按钮 */
            .btn {
                padding: 8px 14px;
                font-size: 12px;
            }
            
            .action-btns {
                flex-direction: column;
                gap: 4px;
            }
            
            /* 提示框 */
            .toast {
                right: 16px;
                left: 16px;
                padding: 10px 16px;
                font-size: 13px;
            }
        }
        
        /* 超小屏幕 */
        @media (max-width: 480px) {
            h1 {
                font-size: 16px;
            }
            
            .card {
                padding: 12px;
            }
            
            .card-title {
                font-size: 15px;
            }
            
            table {
                min-width: 500px;
                font-size: 11px;
            }
            
            th, td {
                padding: 8px 4px;
            }
            
            .bulk-actions .btn {
                width: 100%;
            }
            
            .btn-header {
                font-size: 11px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🍽️ 餐厅看板后台管理系统</h1>
        <div class="header-actions">
            <button class="btn-header" onclick="exportAllData()">📥 导出所有数据</button>
            <button class="btn-header" onclick="resetToken()">🔑 重置密钥</button>
            <a href="/" target="_blank" class="btn-header" style="text-decoration: none;">查看前台 →</a>
        </div>
    </header>

    <div class="container">
        <!-- 全局配置 -->
        <div class="card">
            <div class="card-title">⚙️ 全局配置</div>
            
            <div class="form-row">
                <label class="form-label">页面标题</label>
                <input type="text" class="form-input" id="config-title" placeholder="例如：埃及尼罗河餐厅全接触">
            </div>
            
            <div class="form-row">
                <label class="form-label">日期/位置</label>
                <div style="flex: 1;">
                    <input type="text" class="form-input" id="config-date" placeholder="例如：2025-12-08 午餐">
                    <div class="checkbox-group" style="margin-top: 8px;">
                        <input type="checkbox" id="config-auto-date">
                        <label for="config-auto-date">自动生成当前日期</label>
                    </div>
                    <div class="help-text">勾选后将自动显示当前日期和时间段（午餐/晚餐）</div>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
        </div>

        <!-- 菜品管理 -->
        <div class="card">
            <div class="card-title">
                <span>🍽️ 菜品管理</span>
                <div class="bulk-actions">
                    <button class="btn btn-success" onclick="addDish()">➕ 新增菜品</button>
                    <button class="btn btn-secondary" onclick="importDishes()">📤 批量导入</button>
                    <button class="btn" style="background:#17a2b8; color:white;" onclick="openSmartImport()">📋 智能导入菜单</button>
                    <button class="btn btn-secondary" onclick="exportDishes()">📥 导出表格</button>
                </div>
            </div>
            
            <div class="table-container">
                <table id="dishes-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th>菜品名称</th>
                            <th>厨师</th>
                            <th style="width: 80px;">点赞数</th>
                            <th style="width: 80px;">踩数</th>
                            <th style="width: 120px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="dishes-tbody">
                        <tr><td colspan="6" style="text-align: center; color: #999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 厨师管理 -->
        <div class="card">
            <div class="card-title">
                <span>👨‍🍳 厨师管理</span>
                <div class="bulk-actions">
                    <button class="btn btn-success" onclick="addChef()">➕ 新增厨师</button>
                    <button class="btn btn-secondary" onclick="importChefs()">📤 批量导入</button>
                    <button class="btn btn-secondary" onclick="exportChefs()">📥 导出表格</button>
                </div>
            </div>
            
            <div class="table-container">
                <table id="chefs-table">
                    <thead>
                        <tr>
                            <th style="width: 50px;">ID</th>
                            <th style="width: 60px;">照片</th>
                            <th>姓名</th>
                            <th>职位</th>
                            <th>简介</th>
                            <th style="width: 70px;">日榜</th>
                            <th style="width: 70px;">月榜</th>
                            <th style="width: 70px;">月票</th>
                            <th style="width: 120px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="chefs-tbody">
                        <tr><td colspan="9" style="text-align: center; color: #999;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
        <div id="smart-import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:white; width:90%; max-width:800px; max-height:90vh; border-radius:8px; display:flex; flex-direction:column; overflow:hidden;">
            <div style="padding:15px 20px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0;">📋 智能菜单识别</h3>
                <span onclick="document.getElementById('smart-import-modal').style.display='none'" style="cursor:pointer; font-size:24px;">&times;</span>
            </div>
            <div style="padding:20px; overflow-y:auto; flex:1;">
                <div style="background:#fff3cd; color:#856404; padding:10px; border-radius:4px; margin-bottom:15px; font-size:13px;">
                    💡 提示：直接粘贴微信群里的菜单通知，系统会自动识别菜品和对应厨师。
                </div>
                <div style="margin-bottom: 10px; font-size: 13px;">
                    <strong>🚫 忽略关键词（逗号分隔）:</strong>
                    <input type="text" id="config-ignore-keywords" value="鲜榨果汁,果汁,主食,温馨提示,充值,小菜" style="width:100%; padding:8px; margin-top:5px; border:1px solid #ddd; border-radius:4px;">
                </div>
                <textarea id="import-text" style="width:100%; height:150px; padding:10px; border:1px solid #ddd; border-radius:4px; margin-bottom:15px;" placeholder="请粘贴菜单文本..."></textarea>
                <button class="btn btn-primary" onclick="parseMenuText()" style="width:100%;">🔍 开始解析</button>
                
                <div id="import-preview" style="display:none; margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
                    <div style="margin-bottom:10px; font-weight:bold; color:#0f6b48;">预览导入结果 (<span id="preview-count">0</span> 道菜)</div>
                    <div style="max-height:300px; overflow-y:auto; border:1px solid #eee; border-radius:4px;">
                        <table style="width:100%; border-collapse:collapse;">
                            <thead style="background:#f8f9fa; position:sticky; top:0;">
                                <tr>
                                    <th style="padding:8px; text-align:left;">菜品名称</th>
                                    <th style="padding:8px; text-align:left;">归属厨师</th>
                                    <th style="padding:8px; text-align:center; width:60px;">状态</th>
                                </tr>
                            </thead>
                            <tbody id="preview-tbody"></tbody>
                        </table>
                    </div>
                    <div id="ignored-items-container" style="display:none; margin-top:10px; font-size:12px; color:#856404; background:#fff3cd; padding:8px; border-radius:4px;">
                        <strong>🚫 已忽略以下内容:</strong>
                        <div id="ignored-items-list" style="margin-top:4px; max-height:80px; overflow-y:auto;"></div>
                    </div>
                    <div style="margin-top:15px; text-align:right;">
                        <button class="btn btn-secondary" onclick="document.getElementById('smart-import-modal').style.display='none'">取消</button>
                        <button class="btn btn-success" onclick="executeImport()">✅ 确认并导入</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏的文件上传输入 -->
    <input type="file" id="file-input-dishes" class="file-input" accept=".json,.csv" onchange="handleDishesImport(event)">
    <input type="file" id="file-input-chefs" class="file-input" accept=".json,.csv" onchange="handleChefsImport(event)">
    <input type="file" id="file-input-photo" class="file-input" accept="image/*">

    <script src="static/js/admin.js?v=2.0.0"></script>
</body>
</html>
